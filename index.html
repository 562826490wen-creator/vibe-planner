    <title>Vibe Planner Global | AI Travel Scheduler</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Font (Pretendard & Inter) -->
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
            /* Prevent page scroll */
        }

        /* Glassmorphism Styles */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #3B82F6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(107, 114, 128, 0.8);
        }

        /* Leaflet Overrides */
        .leaflet-popup-content-wrapper {
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 4px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .leaflet-popup-content {
            margin: 12px;
            font-family: inherit;
        }

        .leaflet-container a.leaflet-popup-close-button {
            top: 12px;
            right: 12px;
            color: #6B7280;
        }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
            overflow: hidden;
            border-radius: 12px !important;
        }

        .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            color: #374151 !important;
        }

        /* Initial Load Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>

        // Setup Map (Light theme tiles matching "Antigravity" vibe)
        const map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let markerGroup = L.featureGroup().addTo(map);

        // UI Elements
        const citySelect = document.getElementById('citySelect');
        const daysBtns = document.querySelectorAll('.day-btn');
        const generateBtn = document.getElementById('generateBtn');
        const itineraryList = document.getElementById('itineraryList');
        const emptyState = document.getElementById('emptyState');

        // Event Listeners
        citySelect.addEventListener('change', (e) => {
            const city = db[e.target.value];
            map.flyTo(city.coords, 12, { duration: 2, easeLinearity: 0.25 });
        });

        daysBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                daysBtns.forEach(b => {
                    b.classList.remove('active', 'bg-blue-600', 'text-white', 'shadow-md', 'scale-[1.02]');
                    b.classList.add('bg-white/60', 'text-gray-600');
                });
                const target = e.target;
                target.classList.add('active', 'bg-blue-600', 'text-white', 'shadow-md', 'scale-[1.02]');
                target.classList.remove('bg-white/60', 'text-gray-600');
                selectedDays = parseInt(target.getAttribute('data-days'));
            });
        });

        // Time Generator Helper (approximate 3 spots a day: 10AM, 2PM, 6PM)
        const times = ["10:00 AM", "02:00 PM", "06:00 PM"];

        // Generate Itinerary
        generateBtn.addEventListener('click', () => {
            const cityKey = citySelect.value;
            const cityData = db[cityKey];
            const neededSpotsCount = selectedDays * 3;

            // Slice the required number of spots
            const scheduleSpots = cityData.spots.slice(0, neededSpotsCount);

            // Clear UI and Map
            if (emptyState) emptyState.style.display = 'none';
            itineraryList.innerHTML = '';
            markerGroup.clearLayers();
            markersMap = {};

            let currentDay = 0;
            let boundsData = [];

            scheduleSpots.forEach((spot, idx) => {
                const dayNum = Math.floor(idx / 3) + 1;
                const timeStr = times[idx % 3];
                const spotId = `spot_${idx}`;

                // Add Day Header if it's the first spot of the day
                if (dayNum !== currentDay) {
                    currentDay = dayNum;
                    const header = document.createElement('div');
                    header.className = 'sticky top-0 z-20 pt-4 pb-2 bg-[#f8fafc]/90 backdrop-blur-xl mt-4 first:mt-0';
                    header.innerHTML = `
                        <div class="inline-flex items-center px-4 py-1.5 bg-white rounded-2xl shadow-sm border border-gray-200/60">
                            <i data-lucide="calendar" class="w-4 h-4 text-blue-600 mr-2"></i>
                            <span class="text-gray-800 font-bold text-sm tracking-wide">Day ${dayNum}</span>
                        </div>
                    `;
                    itineraryList.appendChild(header);
                    lucide.createIcons({ root: header });
                }

                // Create Card
                const card = document.createElement('div');
                card.className = "glass-card rounded-2xl p-4 mb-3 cursor-pointer group relative overflow-hidden";

                // Fetch beautifully generated image for vibe
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(cityData.name + ' ' + spot[0])}?width=400&height=300&nologo=true`;

                card.innerHTML = `
                    <div class="flex gap-4 relative z-10">
                        <div class="w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 shadow-sm relative bg-gray-200">
                            <img src="${imageUrl}" alt="${spot[0]}" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        </div>
                        <div class="flex-1 min-w-0 py-1">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-bold text-gray-900 text-base line-clamp-1 group-hover:text-blue-600 transition-colors">${spot[0]}</h3>
                            </div>
                            <div class="inline-flex items-center bg-blue-50 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-md mb-2">
                                <i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${timeStr}
                            </div>
                            <p class="text-gray-500 text-xs leading-relaxed line-clamp-2">${spot[3]}</p>
                        </div>
                    </div>
                `;
                card.onclick = () => focusOnMap(spotId);
                itineraryList.appendChild(card);
                lucide.createIcons({ root: card });

                // Map Marker
                const markerHtml = `
                    <div style="background-color: #2563EB; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 3px solid white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); font-size: 14px; position: relative;">
                        ${idx + 1}
                        <div style="position: absolute; bottom: -6px; width: 6px; height: 6px; background: #2563EB; transform: rotate(45deg); z-index: -1;"></div>
                    </div>
                `;

                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: markerHtml,
                    iconSize: [32, 32],
                    iconAnchor: [16, 32],
                    popupAnchor: [0, -32]
                });

                const popupHtml = `
                    <div class="p-2 w-48">
                        <img src="${imageUrl}" class="w-full h-24 object-cover rounded-lg mb-3 shadow-sm">
                        <div class="bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded inline-block mb-2 uppercase tracking-wider">Day ${dayNum} · ${timeStr}</div>
                        <h4 class="font-bold text-gray-900 text-sm mb-1">${spot[0]}</h4>
                        <p class="text-xs text-gray-500 m-0 leading-tight">${spot[3]}</p>
                    </div>
                `;

                const marker = L.marker([spot[1], spot[2]], { icon: customIcon })
                    .bindPopup(popupHtml, { autoPanPadding: [50, 50] })
                    .addTo(markerGroup);

                markersMap[spotId] = marker;
                boundsData.push([spot[1], spot[2]]);
            });

            // Adjust Map
            map.fitBounds(boundsData, { padding: [60, 60], maxZoom: 15, animate: true, duration: 1.5 });

            // Button Vibe
            generateBtn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i><span>Itinerary Ready! (行程就绪 / 일정 완성)</span>`;
            generateBtn.classList.remove('bg-gray-900', 'hover:bg-black');
            generateBtn.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
            generateBtn.style.transform = 'scale(0.98)';
            setTimeout(() => generateBtn.style.transform = 'scale(1)', 150);

            lucide.createIcons();
        });

        // Focus function
        function focusOnMap(spotId) {
            const targetMarker = markersMap[spotId];
            if (!targetMarker) return;

            map.flyTo(targetMarker.getLatLng(), 16, { duration: 1.5, easeLinearity: 0.2 });
            map.once('moveend', () => targetMarker.openPopup());
        }

        // Init initial view based on selected dropdown
        citySelect.dispatchEvent(new Event('change'));
    </script>
</body>

</html>
